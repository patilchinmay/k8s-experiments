---
# Worker cluster — receives dispatched jobs from the manager cluster and
# actually runs the job pods.  Kueue is installed here too (in "worker mode"
# — it only needs the job integration, not MultiKueue objects).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kueue-worker
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    metadata:
      name: config
    apiServer:
      extraArgs:
        enable-admission-plugins: "NamespaceLifecycle,LimitRanger,ServiceAccount,TaintNodesByCondition,Priority,DefaultTolerationSeconds,DefaultStorageClass,PersistentVolumeClaimResize,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota"
nodes:
  - role: control-plane

  # Two worker nodes — job pods actually run here.
  - role: worker
    labels:
      node.kubernetes.io/instance-type: standard-1

  - role: worker
    labels:
      node.kubernetes.io/instance-type: standard-2
---
