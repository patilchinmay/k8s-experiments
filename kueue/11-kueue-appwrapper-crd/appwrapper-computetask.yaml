apiVersion: workload.codeflare.dev/v1beta2
kind: AppWrapper
metadata:
  generateName: my-task-
  namespace: "default"
  labels:
    # Required — tells Kueue which LocalQueue to submit to.
    kueue.x-k8s.io/queue-name: default-queue
  annotations:
    workload.codeflare.dev.appwrapper/failureGracePeriodDuration: 10s
    workload.codeflare.dev.appwrapper/retryPausePeriodDuration: 10s
    workload.codeflare.dev.appwrapper/retryLimit: "0"
    workload.codeflare.dev.appwrapper/deletionOnFailureGracePeriodDuration: "30s"
    workload.codeflare.dev.appwrapper/successTTLDuration: "10s"
spec:
  components:
    - podSets:
        - path: "template.spec.template"
          replicas: 1
      template:
        apiVersion: example.com/v1
        kind: ComputeTask
        metadata:
          labels:
            app.kubernetes.io/name: computetask
            app.kubernetes.io/managed-by: kustomize
          name: computetask-sample
        spec:
          suspend: false
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: task
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - "echo 'hello from computetask' && for i in $(seq 1 30); do echo $i; sleep 1; done"
                  resources:
                    requests:
                      cpu: 100m
                      memory: 64Mi
                    limits:
                      cpu: 200m
                      memory: 128Mi
