# Step 1: Fill org-compute's gpu-flavor quota with team-ml workloads.
#
# Each JobSet requests:
#   leader:  1 replica × 1 pod × 100m CPU / 64Mi  = 100m CPU / 64Mi
#   worker:  1 replica × 1 pod × 100m CPU / 64Mi  = 100m CPU / 64Mi
#   Total per JobSet: 200m CPU / 128Mi
#
# Two JobSets together = 400m CPU / 256Mi = exactly org-compute's gpu-flavor quota.
#
# After these are admitted:
#   org-compute gpu-flavor: 400m/400m — FULL
#   org-root burst pool:    0/600m    — available for borrowing
#
# Any further team-ml workload must borrow from org-root's burst pool.
# Use `kubectl create` (not `kubectl apply`) — these use generateName.

---
# Fill JobSet 1
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  generateName: jobset-ml-fill-1-
  namespace: team-ml
  labels:
    kueue.x-k8s.io/queue-name: ml-queue
    kueue.x-k8s.io/priority-class: low-priority
spec:
  suspend: true
  replicatedJobs:
    - name: leader
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 1
          completions: 1
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: leader
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== ml-fill-1: LEADER ==="
                      sleep infinity
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
    - name: worker
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 1
          completions: 1
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: worker
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== ml-fill-1: WORKER ==="
                      sleep infinity
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"

