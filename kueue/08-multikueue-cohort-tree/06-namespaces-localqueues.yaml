# Namespaces, LocalQueues, and WorkloadPriorityClasses
#
# Must be applied to ALL three clusters — workers need the same namespace
# and LocalQueue names to accept mirrored workloads from MultiKueue.
#
# WorkloadPriorityClasses are cluster-scoped and only meaningful on the manager
# for admission ordering and cohort preemption. Workers ignore them.

---
# high-priority — triggers reclaimWithinCohort on the subtree
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: high-priority
value: 100

---
# low-priority — can be preempted by higher-priority workloads within the CohortTree
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: low-priority
value: 10

# ════════════════════════════════════════════════════════════════════════════
# team-ml — GPU training workloads (worker-1 primary, worker-2 fallback)
# ════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-ml
  labels:
    purpose: kueue-experiment
    kubernetes.io/metadata.name: team-ml

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: ml-queue
  namespace: team-ml
spec:
  clusterQueue: ml-cq

# ════════════════════════════════════════════════════════════════════════════
# team-data — data processing workloads (worker-2 primary, worker-1 secondary)
# ════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-data
  labels:
    purpose: kueue-experiment
    kubernetes.io/metadata.name: team-data

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: data-queue
  namespace: team-data
spec:
  clusterQueue: data-cq

# ════════════════════════════════════════════════════════════════════════════
# team-platform — platform/infra workloads (either worker)
# ════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-platform
  labels:
    purpose: kueue-experiment
    kubernetes.io/metadata.name: team-platform

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: platform-queue
  namespace: team-platform
spec:
  clusterQueue: platform-cq
