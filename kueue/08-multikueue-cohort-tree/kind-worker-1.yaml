---
# Worker cluster 1 — GPU cluster (gpu=A100 nodes).
# Hosts team-ml and team-platform workloads routed by MultiKueue.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kueue-worker-1
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    metadata:
      name: config
    apiServer:
      extraArgs:
        enable-admission-plugins: "NamespaceLifecycle,LimitRanger,ServiceAccount,TaintNodesByCondition,Priority,DefaultTolerationSeconds,DefaultStorageClass,PersistentVolumeClaimResize,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota"
nodes:
  - role: control-plane

  # ── GPU node ─────────────────────────────────────────────────────────────
  # Targeted by gpu-flavor ResourceFlavor (nodeLabels: node-type=gpu).
  # ML and platform training jobs land on this node.
  - role: worker
    labels:
      node-type: gpu
---
