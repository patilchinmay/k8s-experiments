# Cohort Tree — manager cluster only
#
# Tree structure:
#
#   org-root  (shared burst pool: 600m cpu / 384Mi memory on gpu-flavor)
#   ├── org-compute  (shared compute pool: 400m cpu / 256Mi on gpu-flavor)
#   │   ├── ml-cq     (team-ml: primary gpu workloads)
#   │   └── data-cq   (team-data: can borrow gpu when idle)
#   └── org-platform  (platform pool: 200m cpu / 128Mi on gpu-flavor)
#       └── platform-cq  (team-platform: infra/tooling workloads)
#
# Key design decisions:
#
#   1. nominalQuota is defined on Cohorts, NOT on ClusterQueues.
#      ClusterQueues set nominalQuota: 0 and borrow from their parent Cohort.
#      This centralises quota management at the org level.
#
#   2. org-root provides a shared burst pool accessible to the entire tree.
#      Children can borrow from it when their own cohort's quota is exhausted.
#
#   3. org-compute pools resources for the two compute teams (ml + data).
#      They borrow within org-compute first, then from org-root.
#
#   4. org-platform is a separate subtree — platform team cannot borrow
#      from org-compute (subtrees are isolated unless they share a common ancestor).
#
# Borrowing rules in a CohortTree:
#   - A ClusterQueue can borrow from any Cohort in its CohortTree
#     (subject to lendingLimit at each level).
#   - Preemption scopes: reclaimWithinCohort targets borrowers within the
#     same subtree; withinClusterQueue targets the queue itself.

---
# ── Root cohort — shared burst pool for the entire org ────────────────────
# nominalQuota here represents additional resources on top of what child
# Cohorts define. It acts as a shared overflow pool.
apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: org-root
spec:
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        # gpu-flavor: 600m cpu / 384Mi — org-wide burst budget.
        # Any ClusterQueue in the CohortTree can borrow from here
        # (subject to its own borrowingLimit and each cohort's lendingLimit).
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "600m"
              lendingLimit: "600m"   # lend the full burst pool
            - name: memory
              nominalQuota: "384Mi"
              lendingLimit: "384Mi"
        # cpu-flavor: 300m cpu / 192Mi — org-wide CPU overflow (worker-2).
        - name: cpu-flavor
          resources:
            - name: cpu
              nominalQuota: "300m"
              lendingLimit: "300m"
            - name: memory
              nominalQuota: "192Mi"
              lendingLimit: "192Mi"

---
# ── org-compute — pools resources for ml and data teams ───────────────────
# Has its own quota that ml-cq and data-cq share between them.
# Can also borrow from org-root when org-compute's own quota is exhausted.
apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: org-compute
spec:
  parentName: org-root
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        # gpu-flavor: 400m cpu / 256Mi — compute team pool.
        # ml-cq and data-cq share this; excess comes from org-root's burst pool.
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "400m"
              lendingLimit: "400m"   # lend entire pool within org-compute
            - name: memory
              nominalQuota: "256Mi"
              lendingLimit: "256Mi"

---
# ── org-platform — isolated subtree for the platform team ─────────────────
# Separate from org-compute; platform-cq can only borrow from org-platform
# and org-root, not from org-compute's quota.
apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: org-platform
spec:
  parentName: org-root
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        # gpu-flavor: 200m cpu / 128Mi — platform team's dedicated pool.
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "200m"
              lendingLimit: "200m"
            - name: memory
              nominalQuota: "128Mi"
              lendingLimit: "128Mi"
