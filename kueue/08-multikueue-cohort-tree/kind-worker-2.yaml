---
# Worker cluster 2 — CPU-heavy cluster (node-type=cpu nodes).
# Hosts team-data and team-platform workloads routed by MultiKueue.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kueue-worker-2
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    metadata:
      name: config
    apiServer:
      extraArgs:
        enable-admission-plugins: "NamespaceLifecycle,LimitRanger,ServiceAccount,TaintNodesByCondition,Priority,DefaultTolerationSeconds,DefaultStorageClass,PersistentVolumeClaimResize,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota"
nodes:
  - role: control-plane

  # ── CPU node ──────────────────────────────────────────────────────────────
  # Targeted by cpu-flavor ResourceFlavor (nodeLabels: node-type=cpu).
  # Data processing jobs land on this node.
  - role: worker
    labels:
      node-type: cpu
---
