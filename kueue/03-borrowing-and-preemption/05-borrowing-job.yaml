apiVersion: batch/v1
kind: Job
metadata:
  generateName: borrowing-job-a-3-
  namespace: team-a
  labels:
    kueue.x-k8s.io/queue-name: team-a-queue
    experiment-role: borrowing
spec:
  completions: 1
  parallelism: 1
  template:
    spec:
      # low-priority: this workload is borrowing and can be preempted when
      # team-b needs its quota back.
      priorityClassName: low-priority
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "[team-a borrowing-job] started on $(hostname)"
              echo "I am running on team-b's capacity — borrowed 1 CPU from team-b-cq."
              echo "I will be preempted if team-b submits a high-priority job."
              sleep 300
              echo "[team-a borrowing-job 3] done"
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
