# Namespace and LocalQueue — apply to BOTH clusters
# for ctx in kind-kueue-manager kind-kueue-worker-1; do
#   kubectl apply -f 04-namespace-localqueue.yaml --context $ctx
# done
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-compute

---
# LocalQueue on the manager — users submit ComputeTask objects here.
# LocalQueue on the worker — MultiKueue mirrors the Workload here; the worker
# controller then creates the backing Pod.

apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: compute-queue
  namespace: team-compute
spec:
  clusterQueue: compute-cq
