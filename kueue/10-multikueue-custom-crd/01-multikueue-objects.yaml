# MultiKueue objects — apply to manager cluster ONLY
# kubectl apply -f 01-multikueue-objects.yaml --context kind-kueue-manager
---
# MultiKueueCluster — points to the single worker cluster.
# The kubeconfig Secret is created by setup.sh.

apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueCluster
metadata:
  name: kueue-worker-1
spec:
  clusterSource:
    kubeConfig:
      locationType: Secret
      location: kueue-worker-1-kubeconfig

---
# MultiKueueConfig — lists the worker clusters Kueue can dispatch to.

apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueConfig
metadata:
  name: multikueue-config
spec:
  clusters:
    - kueue-worker-1

---
# AdmissionCheck — gates admission via MultiKueue.
# controllerName MUST be exactly "kueue.x-k8s.io/multikueue".

apiVersion: kueue.x-k8s.io/v1beta2
kind: AdmissionCheck
metadata:
  name: multikueue-check
spec:
  controllerName: kueue.x-k8s.io/multikueue
  parameters:
    apiGroup: kueue.x-k8s.io
    kind: MultiKueueConfig
    name: multikueue-config
