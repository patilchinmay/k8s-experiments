# ComputeTask CRD — apply to BOTH clusters before deploying the controller.
# for ctx in kind-kueue-manager kind-kueue-worker-1; do
#   kubectl apply -f 00-computetask-crd.yaml --context $ctx
# done
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: computetasks.compute.example.com
  annotations:
    # Tell Kueue's MultiKueue to watch and sync this resource across clusters.
    # This annotation is recognized by the Kueue MultiKueue controller when
    # externalFrameworks is enabled.
    kueue.x-k8s.io/managed: "true"
spec:
  group: compute.example.com
  names:
    kind: ComputeTask
    listKind: ComputeTaskList
    plural: computetasks
    singular: computetask
    shortNames:
      - ct
    categories:
      - all
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Worker
          type: string
          jsonPath: .status.workerCluster
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                durationSeconds:
                  type: integer
                  minimum: 1
                  default: 60
                  description: "How many seconds the backing Pod should sleep before completing."
                suspend:
                  type: boolean
                  default: true
                  description: "When true, Kueue is holding admission. The controller will not create a Pod."
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Succeeded, Failed]
                  description: "Current lifecycle phase of the ComputeTask."
                startTime:
                  type: string
                  format: date-time
                  description: "When the backing Pod started running."
                completionTime:
                  type: string
                  format: date-time
                  description: "When the backing Pod completed (succeeded or failed)."
                workerCluster:
                  type: string
                  description: "Name of the worker cluster where the Pod is executing."
                podName:
                  type: string
                  description: "Name of the Pod created by the worker controller."
                conditions:
                  type: array
                  items:
                    type: object
                    required: [lastTransitionTime, message, reason, status, type]
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                  x-kubernetes-list-map-keys: [type]
                  x-kubernetes-list-type: map
