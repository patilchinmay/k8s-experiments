# Sample ComputeTask workload — apply to manager cluster.
# kubectl create -f 06-computetask.yaml --context kind-kueue-manager
#
# Uses 'kubectl create' (not apply) because the name is generated.
# Once admitted, Kueue flips spec.suspend to false and MultiKueue mirrors
# the CR to the worker cluster.  The worker controller then creates a Pod.
---
apiVersion: compute.example.com/v1alpha1
kind: ComputeTask
metadata:
  generateName: my-task-
  namespace: team-compute
  labels:
    # Required — tells Kueue which LocalQueue to submit to.
    kueue.x-k8s.io/queue-name: compute-queue
spec:
  # Run for 120 seconds, then exit successfully.
  durationSeconds: 120
  # suspend: true is the default.  Kueue owns this field.
  suspend: true
