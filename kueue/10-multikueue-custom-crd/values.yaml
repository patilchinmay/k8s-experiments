# Kueue Helm Chart Values — Experiment 10 (MultiKueue + Custom CRD)
# Reference: https://github.com/kubernetes-sigs/kueue/blob/main/charts/kueue/values.yaml
#
# Key difference vs experiments 05-09:
#   integrations.externalFrameworks — registers ComputeTask as a Kueue-managed
#   workload type.  Kueue will create a shadow Workload for every ComputeTask
#   that has the kueue.x-k8s.io/queue-name label.

nameOverride: ""
fullnameOverride: ""
enablePrometheus: false
enableCertManager: false
certManager:
  issuerRef: {}
enableVisibilityAPF: false
enableKueueViz: false
kubernetesClusterDomain: cluster.local
controllerManager:
  featureGates:
    - name: MultiKueue
      enabled: true
    # ExternalFrameworks lets us register ComputeTask as a managed workload type.
    - name: ExternalFrameworks
      enabled: true
  manager:
    priorityClassName:
    image:
      repository: us-central1-docker.pkg.dev/k8s-staging-images/kueue/kueue
      tag: main
      pullPolicy: Always
    podAnnotations: {}
    logLevel: 2
    resources:
      limits:
        cpu: "2"
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 512Mi
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  replicas: 1
  imagePullSecrets: []
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
managerConfig:
  controllerManagerConfigYaml: |-
    apiVersion: config.kueue.x-k8s.io/v1beta2
    kind: Configuration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8443
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: c1f6bfd2.kueue.x-k8s.io
    controller:
      groupKindConcurrency:
        Job.batch: 5
        Pod: 5
        Workload.kueue.x-k8s.io: 5
        LocalQueue.kueue.x-k8s.io: 1
        ClusterQueue.kueue.x-k8s.io: 1
        ResourceFlavor.kueue.x-k8s.io: 1
    clientConnection:
      qps: 50
      burst: 100
    integrations:
      frameworks:
      - "batch/job"
      - "pod"
      - "deployment"
      - "statefulset"
      # ComputeTask is registered as an external framework.
      # The group/kind must match the CRD's spec.group and spec.names.kind.
      externalFrameworks:
      - "ComputeTask.v1alpha1.compute.example.com"
metricsService:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  type: ClusterIP
  labels: {}
  annotations: {}
webhookService:
  ipDualStack:
    enabled: false
    ipFamilies: ["IPv6", "IPv4"]
    ipFamilyPolicy: "PreferDualStack"
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  type: ClusterIP
mutatingWebhook:
  reinvocationPolicy: Never
