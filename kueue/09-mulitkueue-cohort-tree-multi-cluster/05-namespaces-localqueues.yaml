# Namespaces, WorkloadPriorityClasses, and LocalQueues
# Must exist on ALL clusters (manager + worker-1 + worker-2).
---
# high-priority — value: 100
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: high-priority
value: 100

---
# low-priority — value: 10
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: low-priority
value: 10

---
apiVersion: v1
kind: Namespace
metadata:
  name: team-ml
  labels:
    purpose: kueue-experiment

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: ml-queue
  namespace: team-ml
spec:
  clusterQueue: team-ml-cq

---
apiVersion: v1
kind: Namespace
metadata:
  name: team-platform
  labels:
    purpose: kueue-experiment

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: platform-queue
  namespace: team-platform
spec:
  clusterQueue: team-platform-cq
