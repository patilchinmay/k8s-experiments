# Step 3: Borrow team-platform-cohort's quota via org-root
# org-root's shared pool is exhausted; Kueue borrows from team-platform-cohort
# (lendingLimit: 300m makes it available at the org-root level)
---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  generateName: jobset-ml-borrow-platform-
  namespace: team-ml
  labels:
    kueue.x-k8s.io/queue-name: ml-queue
    kueue.x-k8s.io/priority-class: low-priority
spec:
  suspend: true
  replicatedJobs:
    - name: leader
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 1
          completions: 1
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: leader
                  image: busybox:1.36
                  command:
                    [
                      sh,
                      -c,
                      "echo '=== ml-borrow-platform: LEADER ==='; sleep infinity",
                    ]
                  resources:
                    requests: { cpu: "100m", memory: "64Mi" }
                    limits: { cpu: "100m", memory: "64Mi" }
    - name: worker
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 2
          completions: 2
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: worker
                  image: busybox:1.36
                  command:
                    [
                      sh,
                      -c,
                      "echo '=== ml-borrow-platform: WORKER ==='; sleep infinity",
                    ]
                  resources:
                    requests: { cpu: "100m", memory: "64Mi" }
                    limits: { cpu: "100m", memory: "64Mi" }
