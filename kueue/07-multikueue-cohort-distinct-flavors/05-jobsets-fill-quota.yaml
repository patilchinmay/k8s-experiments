# team-a fill JobSets — two low-priority JobSets that fill team-a's h100-queue nominal quota.
#
# Each JobSet requests:
#   leader:  1 replica × 1 pod × 100m CPU / 64Mi  = 100m CPU / 64Mi
#   worker:  1 replica × 2 pods × 100m CPU / 64Mi = 200m CPU / 128Mi
#   Total:   300m CPU / 192Mi per JobSet
#
# Two JobSets together = 600m CPU / 384Mi = exactly team-a's h100-queue nominalQuota
#
# After these are admitted:
#   h100-cq: 600m/600m on h100-flavor — FULL
#   b200-cq: 0m/300m on b200-flavor   — 300m available (lendable)
#
# Any subsequent team-a workload cannot use h100-flavor → Kueue will
# try b200-flavor (borrowing) when 06-jobset-borrowing.yaml is applied.
#
# Note: use `kubectl create` (not `kubectl apply`) — these use generateName.

---
# Fill JobSet 1
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  generateName: jobset-fill-a-1-
  namespace: team-a
  labels:
    kueue.x-k8s.io/queue-name: h100-queue
    kueue.x-k8s.io/priority-class: low-priority
spec:
  suspend: true
  replicatedJobs:
    - name: leader
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 1
          completions: 1
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: leader
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== fill-a-1: LEADER ==="
                      sleep infinity
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
    - name: worker
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 2
          completions: 2
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: worker
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== fill-a-1: WORKER ==="
                      sleep infinity
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"

