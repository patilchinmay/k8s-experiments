# Namespaces and LocalQueues must exist on ALL clusters. 
#
# MultiKueue mirrors the JobSet into the SAME namespace on the worker, and the mirrored Workload
# uses the SAME LocalQueue name to find the worker's ClusterQueue.
#
# WorkloadPriorityClasses are cluster-scoped and only meaningful on the manager.
# They control Kueue admission priority and cohort preemption ordering.
#
# Kueue on worker clusters ignores them (workers re-admit via their own CQ).

---
# high-priority — value: 100
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: high-priority
value: 100

---
# low-priority — value: 10
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: low-priority
value: 10

# ════════════════════════════════════════════════════════════════════════════
# team-a
# ════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-a
  labels:
    purpose: kueue-experiment

---
# LocalQueue for team-a — routes to h100-cq on all clusters.
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: h100-queue
  namespace: team-a
spec:
  clusterQueue: h100-cq

# ════════════════════════════════════════════════════════════════════════════
# team-b
# ════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b
  labels:
    purpose: kueue-experiment

---
# LocalQueue for team-b — routes to b200-cq on all clusters.
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: b200-queue
  namespace: team-b
spec:
  clusterQueue: b200-cq
