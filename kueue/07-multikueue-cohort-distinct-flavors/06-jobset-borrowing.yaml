# team-a borrowing JobSet — exceeds team-a's nominal quota on team-a-flavor.
#
# At this point both fill JobSets are running and team-a-cq has consumed its
# full team-a-flavor nominalQuota (600m/600m). When this workload arrives:
#   1. Kueue tries team-a-flavor → no headroom (quota exhausted).
#   2. Kueue tries team-b-flavor → team-b-cq has 300m idle under lendingLimit.
#   3. Workload admitted on team-b-flavor (borrowing from the cohort).
#
# Key observation on the MANAGER:
#   kubectl describe workload -n team-a <name> --context kind-kueue-manager
#   → Status.Admission.PodSetAssignments[].Flavors: {cpu: team-b-flavor}
#                                                        ^^^^^^^^^^^^^^
#   This confirms team-a borrowed team-b-flavor from the cohort.
#
# Key observation on the WORKER:
#   kubectl get pods -n team-a --context kind-kueue-worker-X -o wide
#   → Pods run on team=team-a nodes because the worker's team-a-cq uses
#     team-a-flavor (with nodeLabels: team=team-a) and has generous quota.
#   Note: the worker independently selects its flavor. The cross-flavor borrowing
#   is a manager-level quota event visible in Workload.status on the manager.
#
# This workload is LOW priority and will be preempted in Step 6 when team-b
# submits a high-priority workload via 07-jobset-preemption-trigger.yaml.
#
# Submit with:
#   kubectl create -f 06-jobset-borrowing.yaml -n team-a --context kind-kueue-manager

---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  generateName: jobset-borrow-a-
  namespace: team-a
  labels:
    experiment: multikueue-cohort-distinct-flavors
    kueue.x-k8s.io/queue-name: team-a-queue
    # low-priority: this workload is borrowing and can be preempted when
    # team-b reclaims its lent team-b-flavor quota.
    kueue.x-k8s.io/priority-class: low-priority
spec:
  suspend: true
  replicatedJobs:
    - name: leader
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 1
          completions: 1
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: leader
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== borrow-a: LEADER ==="
                      echo "Node: $(hostname)"
                      echo "I am a team-a workload borrowing team-b-flavor quota."
                      echo "On the manager, Workload.status shows:"
                      echo "  Flavors: {cpu: team-b-flavor} (not team-a-flavor!)"
                      echo "I will be preempted if team-b submits a high-priority workload."
                      sleep 300
                      echo "borrow-a leader done."
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
    - name: worker
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 2
          completions: 2
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: worker
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== borrow-a: WORKER ==="
                      echo "Node: $(hostname)"
                      echo "I am a team-a workload borrowing team-b-flavor quota."
                      echo "I will be preempted if team-b reclaims its quota."
                      sleep 300
                      echo "borrow-a worker done."
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
