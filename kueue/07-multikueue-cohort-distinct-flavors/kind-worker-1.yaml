---
# Worker cluster 1 — H100-only cluster.
# Receives and executes fill JobSets (team-a nominal quota) mirrored from the manager.
#
# All nodes have gpu=H100. The team-a-flavor ResourceFlavor (03-worker-clusterqueues.yaml)
# uses nodeLabels: {gpu: H100}, so all pods admitted here land on H100 nodes.
#
# This cluster only hosts team-a-cq. The borrow job and preemption job are
# routed to worker-2 (B200) via per-flavor AdmissionChecks on the manager.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kueue-worker-1
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    metadata:
      name: config
    apiServer:
      extraArgs:
        enable-admission-plugins: "NamespaceLifecycle,LimitRanger,ServiceAccount,TaintNodesByCondition,Priority,DefaultTolerationSeconds,DefaultStorageClass,PersistentVolumeClaimResize,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota"
nodes:
  - role: control-plane

  # ── H100 node ─────────────────────────────────────────────────────────────
  # Targeted by team-a-flavor ResourceFlavor (nodeLabels: gpu=H100).
  # Fill JobSets dispatched to team-a-cq land on this node.
  - role: worker
    labels:
      gpu: H100
---
