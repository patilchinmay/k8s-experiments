---
# spec: {} — no nodeLabels needed; the manager does not run job pods.
# The matching worker-side flavor has nodeLabels.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: h100-flavor
spec: {}

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: b200-flavor
spec: {}

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: h100-cq
  annotations:
    # Documentation only — not read by Kueue.
    multikueue.kueue.x-k8s.io/cluster-role: manager
spec:
  cohortName: shared-pool
  namespaceSelector: {}
  queueingStrategy: BestEffortFIFO

  #########################################################################################
  #                                 Mental Model:
  # Manager cluster:
  #     cohort + borrowingLimit,lendingLimit  = POLICY (who can borrow what from whom)
  # Worker cluster:   
  #     NO COHORT + nominalQuota              = CAPACITY (what physical resources exist)
  #########################################################################################
  
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        # ── Primary flavor: h100's own quota pool ────────────────────────
        - name: h100-flavor
          resources:
            - name: cpu
              nominalQuota: "600m"
              borrowingLimit: "0"    # cannot borrow more h100-flavor
              lendingLimit: "0"   # cannot lend h100-flavor
            - name: memory
              nominalQuota: "384Mi"
              borrowingLimit: "0"
              lendingLimit: "0"
        # ── Secondary flavor: borrow from b200-cq when h100-flavor full ─
        - name: b200-flavor
          resources:
            - name: cpu
              nominalQuota: "0"      # h100-cq has no nominal quota on b200-flavor
              borrowingLimit: "300m" # but can borrow enough for 1 extra JobSet
            - name: memory
              nominalQuota: "0"
              borrowingLimit: "192Mi"

  preemption:
    reclaimWithinCohort: LowerPriority   # reclaim lent quota from lower-priority borrowers
    withinClusterQueue: LowerPriority    # preempt lower-priority jobs within own queue too
    borrowWithinCohort:
      policy: LowerPriority              # only borrow from queues with lower-priority workloads

  admissionChecksStrategy:
    admissionChecks:
      - name: multikueue-check

---

apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: b200-cq
  annotations:
    multikueue.kueue.x-k8s.io/cluster-role: manager
spec:
  cohortName: shared-pool
  namespaceSelector: {}
  queueingStrategy: BestEffortFIFO

  #########################################################################################
  #                                 Mental Model:
  # Manager cluster:
  #     cohort + borrowingLimit,lendingLimit  = POLICY (who can borrow what from whom)
  # Worker cluster:   
  #     NO COHORT + nominalQuota              = CAPACITY (what physical resources exist)
  #########################################################################################

  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: b200-flavor
          resources:
            - name: cpu
              nominalQuota: "300m"
              borrowingLimit: "0"    # b200-cq cannot borrow more b200-flavor
              lendingLimit: "300m"   # b200-cq lends ALL its quota to h100-cq
            - name: memory
              nominalQuota: "192Mi"
              borrowingLimit: "0"
              lendingLimit: "192Mi"

  preemption:
    reclaimWithinCohort: LowerPriority
    withinClusterQueue: LowerPriority
    # No borrowWithinCohort — b200-cq cannot borrow from the cohort.

  admissionChecksStrategy:
    admissionChecks:
      - name: multikueue-check
