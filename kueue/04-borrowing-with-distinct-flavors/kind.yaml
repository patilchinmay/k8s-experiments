---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kueue-cluster
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    metadata:
      name: config
    apiServer:
      extraArgs:
        enable-admission-plugins: "NamespaceLifecycle,LimitRanger,ServiceAccount,TaintNodesByCondition,Priority,DefaultTolerationSeconds,DefaultStorageClass,PersistentVolumeClaimResize,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 30000
        listenAddress: "0.0.0.0"
        protocol: tcp

  # ── Team-A nodes ─────────────────────────────────────────────────────────────
  # team-a owns 2 worker nodes labelled team=team-a.
  # The team-a-flavor ResourceFlavor targets these nodes via nodeLabels.
  - role: worker
    labels:
      team: team-a
      node.kubernetes.io/instance-type: standard-1

  - role: worker
    labels:
      team: team-a
      node.kubernetes.io/instance-type: standard-2

  # ── Team-B nodes ─────────────────────────────────────────────────────────────
  # team-b owns 2 worker nodes labelled team=team-b.
  # The team-b-flavor ResourceFlavor targets these nodes via nodeLabels.
  - role: worker
    labels:
      team: team-b
      node.kubernetes.io/instance-type: standard-3

  - role: worker
    labels:
      team: team-b
      node.kubernetes.io/instance-type: standard-4
---
