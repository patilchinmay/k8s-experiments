# Step 4: team-platform reclaims its lent quota via preemption
#
# At this point:
#   org-root: 900m/900m — FULLY UTILIZED
#   team-ml has 3 running jobs (job-1, job-2, job-3):
#     job-1: using team-ml-cohort's own 300m
#     job-2: borrowing org-root's unallocated 300m
#     job-3: borrowing team-platform-cohort's 300m via org-root  ← PREEMPTIBLE
#
# team-platform submits this high-priority job (300m CPU / 192Mi).
# team-platform-cq has reclaimWithinCohort: LowerPriority.
#
# Kueue sees:
#   1. team-platform-cq needs 300m from team-platform-cohort
#   2. team-platform-cohort's 300m is currently lent to team-ml (job-3)
#   3. job-3 is low-priority; this job is high-priority
#   4. reclaimWithinCohort: LowerPriority → preempt job-3
#
# Result:
#   job-3 is evicted (suspended), freeing 300m in team-platform-cohort
#   This platform job is admitted and dispatched to worker-1
#   job-3 re-queues and waits until capacity is available again
#
# sleep 300 (not infinity) so the platform job eventually completes,
# allowing job-3 to be re-admitted.
#
# Note: use `kubectl create` (not `kubectl apply`) — these use generateName.

---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  generateName: jobset-platform-preempt-
  namespace: team-platform
  labels:
    kueue.x-k8s.io/queue-name: platform-queue
    # high-priority: triggers reclaimWithinCohort: LowerPriority on team-platform-cq.
    # team-platform reclaims the 300m it lent to team-ml (job-3).
    kueue.x-k8s.io/priority-class: high-priority
spec:
  suspend: true
  replicatedJobs:
    - name: leader
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 1
          completions: 1
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: leader
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== platform-preempt: LEADER ==="
                      sleep 300
                      echo "platform-preempt leader done."
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
    - name: worker
      replicas: 1
      template:
        spec:
          completionMode: Indexed
          parallelism: 2
          completions: 2
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: worker
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "=== platform-preempt: WORKER ==="
                      sleep 300
                      echo "platform-preempt worker done."
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "64Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
