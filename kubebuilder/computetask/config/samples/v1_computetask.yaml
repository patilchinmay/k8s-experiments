apiVersion: example.com/v1
kind: ComputeTask
metadata:
  labels:
    app.kubernetes.io/name: computetask
    app.kubernetes.io/managed-by: kustomize
  name: computetask-sample
spec:
  durationSeconds: 30
  suspend: false
  template:
    metadata:
      labels:
        app: computetask-sample
    spec:
      restartPolicy: Never
      containers:
        - name: task
          image: busybox:1.36
          command:
            - sh
            - -c
            - "echo 'hello from template'; sleep 30; echo 'done'"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

