---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: federation-demo
  labels:
    managed-by: argocd
    experiment: argocd-multi-cluster-federation
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-sa-binding
  namespace: federation-demo
  labels:
    managed-by: argocd
    experiment: argocd-multi-cluster-federation
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: federation-demo
roleRef:
  kind: Role
  name: app-role
  apiGroup: rbac.authorization.k8s.io
