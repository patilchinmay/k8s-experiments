{{- /*
Render WorkloadPriorityClasses — shared across all clusters (no scoping).
*/}}
{{- range .Values.workloadPriorityClasses }}
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: {{ .name }}
  labels:
  {{- include "kueue-resources.labels" $ | nindent 4 }}
value: {{ .value }}
{{- if .description }}
description: {{ .description | quote }}
{{- end }}
{{- end }}
