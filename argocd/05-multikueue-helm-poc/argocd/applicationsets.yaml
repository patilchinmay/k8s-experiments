        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valueFiles:
            - ../values/base.yaml
            - ../values/worker-1.yaml
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
