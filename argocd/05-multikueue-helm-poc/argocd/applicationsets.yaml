---
# ApplicationSet: kueue-install-mgmt
#
# Installs the upstream Kueue controller (oci://registry.k8s.io/kueue/charts/kueue)
# on the management cluster with MultiKueue feature gate enabled.
# Uses ArgoCD multi-source: OCI chart + Git values file ($values ref).
# Targets clusters labelled kueue-poc-cluster=true AND kueue-poc-role=mgmt.
#
# repoURL, targetRevision, and kueueVersion are injected from cluster secret
# annotations (kueue-poc/repo-url, kueue-poc/target-revision, kueue-poc/kueue-version)
# via the cluster generator values block — set by setup.sh.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-install-mgmt
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: kueue-poc
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-cluster: "true"
            kueue-poc-role: mgmt
        values:
          repoURL: '{{index .metadata.annotations "kueue-poc/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "kueue-poc/target-revision"}}'
          kueueVersion: '{{index .metadata.annotations "kueue-poc/kueue-version"}}'
  template:
    metadata:
      name: 'kueue-install-{{index .metadata.labels "kueue-poc-role"}}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kueue/charts
          chart: kueue
          targetRevision: '{{.values.kueueVersion}}'
          helm:
            releaseName: kueue
            valueFiles:
              - $values/argocd/05-multikueue-helm-poc/kueue-install/manager.yaml
        - repoURL: '{{.values.repoURL}}'
          targetRevision: '{{.values.targetRevision}}'
          ref: values
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-install-workers
#
# Installs the upstream Kueue controller on all three worker clusters.
# MultiKueue feature gate is NOT enabled on workers.
# Uses ArgoCD multi-source: OCI chart + Git values file ($values ref).
# Targets clusters labelled kueue-poc-cluster=true with role worker-1/2/3.
#
# repoURL, targetRevision, and kueueVersion injected from cluster secret annotations.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-install-workers
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: kueue-poc
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-cluster: "true"
          matchExpressions:
            - key: kueue-poc-role
              operator: In
              values: [worker-1, worker-2, worker-3]
        values:
          repoURL: '{{index .metadata.annotations "kueue-poc/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "kueue-poc/target-revision"}}'
          kueueVersion: '{{index .metadata.annotations "kueue-poc/kueue-version"}}'
  template:
    metadata:
      name: 'kueue-install-{{index .metadata.labels "kueue-poc-role"}}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kueue/charts
          chart: kueue
          targetRevision: '{{.values.kueueVersion}}'
          helm:
            releaseName: kueue
            valueFiles:
              - $values/argocd/05-multikueue-helm-poc/kueue-install/worker.yaml
        - repoURL: '{{.values.repoURL}}'
          targetRevision: '{{.values.targetRevision}}'
          ref: values
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-resources-mgmt
#
# Deploys kueue-resources Helm chart to the management cluster.
# Uses two valuesFiles: base.yaml (shared topology) + mgmt.yaml (role=manager, RF overrides).
# Targets clusters labelled with kueue-poc-role=mgmt.
#
# repoURL and targetRevision injected from cluster secret annotations.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-resources-mgmt
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: kueue-poc
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-role: mgmt
        values:
          repoURL: '{{index .metadata.annotations "kueue-poc/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "kueue-poc/target-revision"}}'
  template:
    metadata:
      name: 'kueue-resources-{{index .metadata.labels "kueue-poc-role"}}'
    spec:
      project: default
      source:
        repoURL: '{{.values.repoURL}}'
        targetRevision: '{{.values.targetRevision}}'
        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valueFiles:
            - ../values/base.yaml
            - ../values/mgmt.yaml
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
