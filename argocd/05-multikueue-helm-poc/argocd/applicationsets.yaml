---
# ApplicationSet: kueue-poc-helm-mgmt
#
# Deploys kueue-resources Helm chart to the management cluster.
# Uses two valuesFiles: base.yaml (shared topology) + mgmt.yaml (role=manager, RF overrides).
# Targets clusters labelled with kueue-poc-role=mgmt.
#
# __REPO_URL__ and __TARGET_REVISION__ are substituted by setup.sh at apply time.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-poc-helm-mgmt
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-role: mgmt
  template:
    metadata:
      name: 'kueue-poc-helm-mgmt-{{name}}'
    spec:
      project: default
      source:
        repoURL: __REPO_URL__
        targetRevision: __TARGET_REVISION__
        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valuesFiles:
            - ../values/base.yaml
            - ../values/mgmt.yaml
      destination:
        server: '{{server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
