---
# ApplicationSet: kueue-install-mgmt
#
# Installs the upstream Kueue controller (oci://registry.k8s.io/kueue/charts/kueue)
# on the management cluster with MultiKueue feature gate enabled.
# Uses ArgoCD multi-source: OCI chart + Git values file ($values ref).
# Targets clusters labelled kueue-poc-cluster=true AND kueue-poc-role=mgmt.
#
# __REPO_URL__, __TARGET_REVISION__, and __KUEUE_VERSION__ are substituted by setup.sh.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-install-mgmt
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-cluster: "true"
            kueue-poc-role: mgmt
  template:
    metadata:
      name: 'kueue-install-{{metadata.labels.kueue-poc-role}}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kueue/charts
          chart: kueue
          targetRevision: __KUEUE_VERSION__
          helm:
            releaseName: kueue
            valueFiles:
              - $values/argocd/05-multikueue-helm-poc/kueue-install/manager.yaml
        - repoURL: __REPO_URL__
          targetRevision: __TARGET_REVISION__
          ref: values
      destination:
        server: '{{server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-install-workers
#
# Installs the upstream Kueue controller on all three worker clusters.
# MultiKueue feature gate is NOT enabled on workers.
# Uses ArgoCD multi-source: OCI chart + Git values file ($values ref).
# Targets clusters labelled kueue-poc-cluster=true with role worker-1/2/3.
#
# __REPO_URL__, __TARGET_REVISION__, and __KUEUE_VERSION__ are substituted by setup.sh.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-install-workers
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-cluster: "true"
          matchExpressions:
            - key: kueue-poc-role
              operator: In
              values: [worker-1, worker-2, worker-3]
  template:
    metadata:
      name: 'kueue-install-{{metadata.labels.kueue-poc-role}}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kueue/charts
          chart: kueue
          targetRevision: __KUEUE_VERSION__
          helm:
            releaseName: kueue
            valueFiles:
              - $values/argocd/05-multikueue-helm-poc/kueue-install/worker.yaml
        - repoURL: __REPO_URL__
          targetRevision: __TARGET_REVISION__
          ref: values
      destination:
        server: '{{server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-resources-mgmt
#
# Deploys kueue-resources Helm chart to the management cluster.
# Uses two valuesFiles: base.yaml (shared topology) + mgmt.yaml (role=manager, RF overrides).
# Targets clusters labelled with kueue-poc-role=mgmt.
#
# __REPO_URL__ and __TARGET_REVISION__ are substituted by setup.sh at apply time.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-resources-mgmt
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-role: mgmt
  template:
    metadata:
      name: 'kueue-resources-{{metadata.labels.kueue-poc-role}}'
    spec:
      project: default
      source:
        repoURL: __REPO_URL__
        targetRevision: __TARGET_REVISION__
        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valueFiles:
            - ../values/base.yaml
            - ../values/mgmt.yaml
      destination:
        server: '{{server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-resources-worker-1
