apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-resources-worker-1
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-role: worker-1
  template:
    metadata:
      name: 'kueue-resources-{{metadata.labels.kueue-poc-role}}'
    spec:
      project: default
      source:
        repoURL: __REPO_URL__
        targetRevision: __TARGET_REVISION__
        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valueFiles:
            - ../values/base.yaml
            - ../values/worker-1.yaml
      destination:
        server: '{{server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
