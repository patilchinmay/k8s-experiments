---
# ApplicationSet: kueue-install-mgmt
#
# Installs the upstream Kueue controller (oci://registry.k8s.io/kueue/charts/kueue)
# on the management cluster with MultiKueue feature gate enabled.
# Uses ArgoCD multi-source: OCI chart + Git values file ($values ref).
# Targets clusters labelled multikueue-cluster=true AND multikueue-role=mgmt.
#
# repoURL, targetRevision, and kueueVersion are injected from cluster secret
# annotations (multikueue/repo-url, multikueue/target-revision, multikueue/kueue-version)
# via the cluster generator values block — set by setup.sh.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-install-mgmt
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: multikueue-root-app
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            multikueue-cluster: "true"
            multikueue-role: mgmt
        values:
          repoURL: '{{index .metadata.annotations "multikueue/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "multikueue/target-revision"}}'
          kueueVersion: '{{index .metadata.annotations "multikueue/kueue-version"}}'
  template:
    metadata:
      name: 'kueue-install-{{index .metadata.labels "multikueue-role"}}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kueue/charts
          chart: kueue
          targetRevision: '{{.values.kueueVersion}}'
          helm:
            releaseName: kueue
            valueFiles:
              - $values/argocd/05-multikueue-helm-poc/kueue-install/manager.yaml
        - repoURL: '{{.values.repoURL}}'
          targetRevision: '{{.values.targetRevision}}'
          ref: values
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-install-workers
#
# Installs the upstream Kueue controller on all three worker clusters.
# MultiKueue feature gate is NOT enabled on workers.
# Uses ArgoCD multi-source: OCI chart + Git values file ($values ref).
# Targets clusters labelled multikueue-cluster=true with role gke-1/eks-1/onprem-1.
#
# repoURL, targetRevision, and kueueVersion injected from cluster secret annotations.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-install-workers
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: multikueue-root-app
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            multikueue-cluster: "true"
          matchExpressions:
            - key: multikueue-role
              operator: In
              values: [gke-1, eks-1, onprem-1]
        values:
          repoURL: '{{index .metadata.annotations "multikueue/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "multikueue/target-revision"}}'
          kueueVersion: '{{index .metadata.annotations "multikueue/kueue-version"}}'
  template:
    metadata:
      name: 'kueue-install-{{index .metadata.labels "multikueue-role"}}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kueue/charts
          chart: kueue
          targetRevision: '{{.values.kueueVersion}}'
          helm:
            releaseName: kueue
            valueFiles:
              - $values/argocd/05-multikueue-helm-poc/kueue-install/worker.yaml
        - repoURL: '{{.values.repoURL}}'
          targetRevision: '{{.values.targetRevision}}'
          ref: values
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-resources-mgmt
#
# Deploys kueue-resources Helm chart to the management cluster.
# Uses two valuesFiles: base.yaml (shared topology) + mgmt.yaml (role=manager, RF overrides).
# Targets clusters labelled with multikueue-role=mgmt.
#
# repoURL and targetRevision injected from cluster secret annotations.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-resources-mgmt
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: multikueue-root-app
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            multikueue-role: mgmt
        values:
          repoURL: '{{index .metadata.annotations "multikueue/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "multikueue/target-revision"}}'
  template:
    metadata:
      name: 'kueue-resources-{{index .metadata.labels "multikueue-role"}}'
    spec:
      project: default
      source:
        repoURL: '{{.values.repoURL}}'
        targetRevision: '{{.values.targetRevision}}'
        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valueFiles:
            - ../values/base.yaml
            - ../values/mgmt.yaml
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: kueue-resources-workers
#
# Deploys kueue-resources Helm chart to all three worker clusters.
# Uses base.yaml + a per-cluster values file derived directly from the
# multikueue-role cluster label (gke-1/eks-1/onprem-1 → values/gke-1/eks-1/onprem-1.yaml).
# Targets clusters labelled multikueue-cluster=true with role gke-1/eks-1/onprem-1.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-resources-workers
  namespace: argocd
  labels:
    argocd.argoproj.io/managed-by: multikueue-root-app
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            multikueue-cluster: "true"
          matchExpressions:
            - key: multikueue-role
              operator: In
              values: [gke-1, eks-1, onprem-1]
        values:
          repoURL: '{{index .metadata.annotations "multikueue/repo-url"}}'
          targetRevision: '{{index .metadata.annotations "multikueue/target-revision"}}'
  template:
    metadata:
      name: 'kueue-resources-{{index .metadata.labels "multikueue-role"}}'
    spec:
      project: default
      source:
        repoURL: '{{.values.repoURL}}'
        targetRevision: '{{.values.targetRevision}}'
        path: argocd/05-multikueue-helm-poc/chart
        helm:
          releaseName: kueue-resources
          valueFiles:
            - ../values/base.yaml
            - ../values/{{index .metadata.labels "multikueue-role"}}.yaml
      destination:
        server: '{{.server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
