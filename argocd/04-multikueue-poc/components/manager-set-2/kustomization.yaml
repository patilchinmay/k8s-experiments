apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
- multikueue.yaml

# Patch admissionChecks onto CQ-2 only (set-2 scope)
patches:
- patch: |-
    apiVersion: kueue.x-k8s.io/v1beta1
    kind: ClusterQueue
    metadata:
      name: cq-2
    spec:
      admissionChecks:
      - ac-set-2
