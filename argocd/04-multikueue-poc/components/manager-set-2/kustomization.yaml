apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
- multikueue.yaml

# Patch admissionChecks onto CQ-2 only (set-2 scope)
patches:
- patch: |-
    - op: add
      path: /spec/admissionChecksStrategy
      value:
        admissionChecks:
        - name: ac-set-2
  target:
    kind: ClusterQueue
    name: cq-2
