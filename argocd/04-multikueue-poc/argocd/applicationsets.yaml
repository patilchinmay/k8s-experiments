---
# ApplicationSet: kueue-poc-mgmt
#
# Syncs overlays/mgmt to the management cluster (in-cluster).
# Targets clusters labelled with kueue-poc-role=mgmt.
#
# __REPO_URL__ and __TARGET_REVISION__ are substituted by setup.sh at apply time.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kueue-poc-mgmt
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            kueue-poc-role: mgmt
  template:
    metadata:
      name: 'kueue-poc-mgmt-{{name}}'
    spec:
      project: default
      source:
        repoURL: __REPO_URL__
        targetRevision: __TARGET_REVISION__
        path: argocd/04-multikueue-poc/overlays/mgmt
      destination:
        server: '{{server}}'
        namespace: kueue-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
