# cohort-set-2: quota is 500 on both mgmt and worker-3.
# worker-3 overlay patches nominalQuota to reflect its local view.
apiVersion: kueue.x-k8s.io/v1beta1
kind: Cohort
metadata:
  name: cohort-set-2
spec:
  resourceGroups:
  - coveredResources: ["cpu"]
    flavors:
    - name: rf-a
      resources:
      - name: cpu
        nominalQuota: "500"
    - name: rf-b
      resources:
      - name: cpu
        nominalQuota: "100"
