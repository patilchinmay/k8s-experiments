# cohort-set-1: quota represents the total across the set (300 = sum of worker-1 + worker-2).
# Worker overlays patch nominalQuota down to their local share.
apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: cohort-set-1
spec:
  resourceGroups:
  - coveredResources: ["cpu"]
    flavors:
    - name: rf-a
      resources:
      - name: cpu
        nominalQuota: "300"
