apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# worker-1 (GKE, set-1 only): no set-2 objects, no manager components
resources:
- ../../base/shared
- ../../base/set-1

patches:
# RF-A: GKE node pool selector
- patch: |-
    apiVersion: kueue.x-k8s.io/v1beta1
    kind: ResourceFlavor
    metadata:
      name: rf-a
    spec:
      nodeLabels:
        cloud.google.com/gke-nodepool: gpu-pool
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

# CQ-1: worker-1 local quota share = 100
- patch: |-
    apiVersion: kueue.x-k8s.io/v1beta1
    kind: ClusterQueue
    metadata:
      name: cq-1
    spec:
      resourceGroups:
      - coveredResources: ["cpu"]
        flavors:
        - name: rf-a
          resources:
          - name: cpu
            nominalQuota: "100"

# cohort-set-1: worker-1 local quota share = 100
- patch: |-
    apiVersion: kueue.x-k8s.io/v1beta1
    kind: Cohort
    metadata:
      name: cohort-set-1
    spec:
      resourceGroups:
      - coveredResources: ["cpu"]
        flavors:
        - name: rf-a
          resources:
          - name: cpu
            nominalQuota: "100"
